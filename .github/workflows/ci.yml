name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:

jobs:
  frontend-checks:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: neon-spin

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: neon-spin/package-lock.json

      - name: Install dependencies
        run: npm ci
        env:
          HUSKY: 0

      - name: Run linter
        run: npm run lint

      - name: Run tests with coverage
        run: npm run test:ci

      - name: Upload HTML coverage report
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: coverage-html
          path: neon-spin/coverage

      - name: Build project
        run: npm run build
